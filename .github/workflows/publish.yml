name: Publish to PyPI

# Fires when you push a tag like v1.1.0 or v1.2.0
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

# Opt in to Node 24 early so actions/download-artifact@v4 and
# pypa/gh-action-pypi-publish stop emitting Node-20 deprecation warnings
# before June 2026.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build
        run: python -m build

      - name: Twine check
        run: twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/cis-gs/
    # Trusted publishing - no API token required if you've set up a
    # "trusted publisher" on PyPI for this repo.
    # https://docs.pypi.org/trusted-publishers/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        # Falls back to a stored token if trusted publishing is not configured.
        # Add it as repo secret PYPI_API_TOKEN, then uncomment:
        # with:
        #   password: ${{ secrets.PYPI_API_TOKEN }}
