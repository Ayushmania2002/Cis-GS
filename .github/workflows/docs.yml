name: Build & Deploy Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Opt in to Node 24 early so actions/deploy-pages@v4 stops emitting
# the Node-20 deprecation warning before June 2026.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Allow the workflow to publish to gh-pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system deps for PyQt5 (headless)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libegl1 libxcb-xinerama0 libxcb-cursor0

      - name: Install Cis-GS + docs extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]" || pip install -r docs/requirements.txt

      - name: Build HTML
        run: |
          cd docs
          make html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
